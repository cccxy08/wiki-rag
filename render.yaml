services:
  - type: web
    name: wiki-rag
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: EMBEDDING_PROVIDER
        value: zhipu
      - key: ZHIPU_EMBEDDING_MODEL
        value: embedding-3
      - key: RERANKER_ENABLED
        value: "false"
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
