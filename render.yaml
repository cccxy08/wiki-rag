services:
  - type: web
    name: wiki-rag
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: LLM_PROVIDER
        value: minimax
      - key: MINIMAX_BASE_URL
        value: https://api.minimax.chat/v1
      - key: MINIMAX_MODEL
        value: MiniMax-Text-01
      - key: MINIMAX_MULTIMODAL_MODEL
        value: MiniMax-VL-01
      - key: EMBEDDING_PROVIDER
        value: zhipu
      - key: ZHIPU_EMBEDDING_MODEL
        value: embedding-3
      - key: RERANKER_ENABLED
        value: "false"
      - key: RENDER
        value: "true"
      - key: PORT
        value: "10000"
      - key: MINIMAX_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: DINGTALK_ENABLED
        value: "false"
      - key: DINGTALK_MODE
        value: webhook
      - key: DINGTALK_DRIVE_SPACE_ID
        sync: false
      - key: DINGTALK_DRIVE_FOLDER_ID
        sync: false
      - key: DINGTALK_UNION_ID
        sync: false
      - key: DINGTALK_DRIVE_PROXY_URL
        value: http://203.104.35.193:3002
      - key: DINGTALK_DRIVE_USER_ID
        value: "17772548496152445"
